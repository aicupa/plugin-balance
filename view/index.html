<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      height: auto;
      overflow: hidden;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: transparent;
      color: inherit;
      font-size: 12px;
      cursor: no-drop;
    }

    .balance-container {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 2px 0;
    }

    .balance-inputs {
      display: flex;
      gap: 4px;
      align-items: center;
      flex-shrink: 0;
    }

    .balance-input {
      width: 20px;
      height: 20px;
      border: 1px solid rgba(128, 128, 128, 0.3);
      border-radius: 3px;
      background: transparent;
      color: inherit;
      font-size: 11px;
      padding: 0 4px;
      outline: none;
      text-align: center;
      opacity: 0.5;
    }

    .balance-input:focus {
      border-color: rgba(64, 128, 255, 0.5);
    }

    .balance-input::placeholder {
      opacity: 0.4;
      font-size: 10px;
    }

    .balance-label {
      opacity: 0.5;
      font-size: 10px;
      white-space: nowrap;
    }

    .balance-bar-wrap {
      flex: 1;
      min-width: 0;
      position: relative;
    }

    .balance-bar-track {
      height: 16px;
      border-radius: 8px;
      background: rgba(128, 128, 128, 0.15);
      overflow: hidden;
      position: relative;
    }

    .balance-bar-fill {
      height: 100%;
      border-radius: 8px;
      transition: width 0.3s ease, background 0.3s ease;
    }

    .bar-label {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 9px;
      opacity: 0.8;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      pointer-events: none;
      padding: 0 4px;
    }

    .bar-label-left {
      left: 0;
      text-align: center;
    }

    .bar-label-right {
      text-align: center;
    }

    .balance-ratio {
      font-size: 11px;
      opacity: 0.7;
      flex-shrink: 0;
      min-width: 36px;
      text-align: right;
    }
  </style>
</head>

<body>
  <div class="balance-container">
    <div class="balance-inputs">
      <input class="balance-input" id="tempId" placeholder="Temp ID" />
      <span class="balance-label">/</span>
      <input class="balance-input" id="currentId" placeholder="Task ID" />
    </div>
    <div class="balance-bar-wrap">
      <div class="balance-bar-track">
        <div class="balance-bar-fill" id="barFill" style="width:0%"></div>
        <span class="bar-label bar-label-left" id="labelLeft"></span>
        <span class="bar-label bar-label-right" id="labelRight"></span>
      </div>
    </div>
    <span class="balance-ratio" id="ratio">0%</span>
  </div>
  <script>
    (function () {
      let callId = 0
      const pending = {}

      function callPlugin(method, params) {
        return new Promise((resolve) => {
          const id = ++callId
          pending[id] = resolve
          window.parent.postMessage({ type: 'plugin-call', id, method, params }, '*')
        })
      }

      window.addEventListener('message', (e) => {
        const msg = e.data
        if (msg?.type === 'plugin-result' && pending[msg.id]) {
          pending[msg.id](msg.result || msg.error)
          delete pending[msg.id]
        }
        if (msg?.type === 'plugin-init') {
          if (msg.theme) {
            document.body.style.color = msg.theme.color
            var inputs = document.querySelectorAll('.balance-input')
            for (var i = 0; i < inputs.length; i++) {
              inputs[i].style.color = msg.theme.color
            }
          }
          loadConfig()
        }
        if (msg?.type === 'plugin-tree-update') {
          recalculate(msg.tree)
        }
      })

      const tempInput = document.getElementById('tempId')
      const currentInput = document.getElementById('currentId')
      const barFill = document.getElementById('barFill')
      const ratioEl = document.getElementById('ratio')
      const labelLeft = document.getElementById('labelLeft')
      const labelRight = document.getElementById('labelRight')
      let debounceTimer = null

      function onInputChange() {
        clearTimeout(debounceTimer)
        debounceTimer = setTimeout(async () => {
          const tempId = tempInput.value.trim()
          const currentId = currentInput.value.trim()
          await callPlugin('setConfig', { tempId: tempId || null, currentId: currentId || null })
          requestUpdate()
        }, 500)
      }

      tempInput.addEventListener('input', onInputChange)
      currentInput.addEventListener('input', onInputChange)

      function requestUpdate() {
        window.parent.postMessage({ type: 'plugin-request-tree' }, '*')
      }

      async function recalculate(tree) {
        try {
          const res = await callPlugin('calculate', { tree })
          if (res?.ok !== false) {
            const inner = res?.result || res
            const r = inner?.result || inner
            const pct = Math.min(r.percent || 0, 100)
            barFill.style.width = pct + '%'
            var h = Math.round(120 * (1 - pct / 100))
            barFill.style.background = 'hsla(' + h + ', 55%, 65%, 0.25)'
            var offset = pct - 50
            ratioEl.textContent = (offset > 0 ? '+' : '') + offset + '%'
            labelLeft.textContent = r.tempContent || ''
            labelLeft.style.width = pct + '%'
            labelRight.textContent = r.currentContent || ''
            labelRight.style.left = pct + '%'
            labelRight.style.width = (100 - pct) + '%'
          }
        } catch (_) { }

      }

      async function loadConfig() {
        try {
          const res = await callPlugin('getConfig', {})
          const inner = res?.result || res
          const r = inner?.result || inner
          if (r?.tempId) tempInput.value = r.tempId
          if (r?.currentId) currentInput.value = r.currentId
          requestUpdate()
        } catch (_) { }
      }
    })()
  </script>
</body>

</html>
